name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            llvm-version: "20"
          - os: macos-latest
            llvm-version: "20"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Install LLVM (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-20 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y llvm-20-dev
          echo "LLVM_PREFIX=/usr/lib/llvm-20" >> $GITHUB_ENV

      - name: Install LLVM (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm@20
          echo "LLVM_PREFIX=$(brew --prefix llvm@20)" >> $GITHUB_ENV

      - name: Build compiler
        run: zig build -Dllvm-prefix="$LLVM_PREFIX"

      - name: Run unit tests
        run: zig build test -Dllvm-prefix="$LLVM_PREFIX"

      - name: Run integration tests
        run: bash tests/run_examples.sh

  coverage:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Install LLVM
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-20 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y llvm-20-dev

      - name: Install kcov
        run: |
          sudo apt-get install -y cmake g++ pkg-config libdw-dev libcurl4-openssl-dev
          git clone --depth 1 https://github.com/SimonKagstrom/kcov.git /tmp/kcov-src
          mkdir /tmp/kcov-src/build && cd /tmp/kcov-src/build
          cmake .. && make -j$(nproc) && sudo make install

      - name: Build compiler and run tests with coverage
        run: |
          zig build -Dllvm-prefix=/usr/lib/llvm-20
          kcov --include-path=$(pwd)/src/ coverage/ ./zig-out/bin/asthra examples/hello.ast -o /tmp/cov_hello
          kcov --include-path=$(pwd)/src/ coverage/ ./zig-out/bin/asthra examples/arithmetic.ast -o /tmp/cov_arith
          kcov --include-path=$(pwd)/src/ coverage/ ./zig-out/bin/asthra examples/fibonacci.ast -o /tmp/cov_fib
          kcov --include-path=$(pwd)/src/ coverage/ ./zig-out/bin/asthra examples/fizzbuzz.ast -o /tmp/cov_fizz
          kcov --include-path=$(pwd)/src/ coverage/ ./zig-out/bin/asthra examples/ifelse.ast -o /tmp/cov_if
          kcov --include-path=$(pwd)/src/ coverage/ ./zig-out/bin/asthra examples/strings.ast -o /tmp/cov_str
          rm -f /tmp/cov_*

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          directory: coverage/
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
