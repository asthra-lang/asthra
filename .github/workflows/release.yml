name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
            llvm-version: "20"
            artifact: asthra-linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-linux
            llvm-version: "20"
            artifact: asthra-linux-arm64
          - os: macos-latest
            target: aarch64-macos
            llvm-version: "20"
            artifact: asthra-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Install LLVM (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-20 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y llvm-20-dev
          echo "LLVM_PREFIX=/usr/lib/llvm-20" >> $GITHUB_ENV

      - name: Install LLVM (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm@20
          echo "LLVM_PREFIX=$(brew --prefix llvm@20)" >> $GITHUB_ENV

      - name: Build release binary
        run: zig build -Doptimize=ReleaseFast -Dllvm-prefix="$LLVM_PREFIX"

      - name: Run integration tests
        run: bash tests/run_examples.sh

      - name: Package binary
        run: |
          mkdir -p dist
          cp zig-out/bin/asthra dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/**/*
